<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedding Vector Space</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #canvas-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  canvas { display: block; }

  /* HUD overlay */
  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #title-bar {
    position: absolute;
    top: 24px; left: 28px;
    pointer-events: auto;
  }

  #title-bar h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 4px;
  }

  #title-bar .subtitle {
    font-size: 11px;
    color: #666;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    display: none;
    background: rgba(10, 10, 15, 0.92);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    pointer-events: none;
    backdrop-filter: blur(12px);
    z-index: 100;
    max-width: 220px;
  }

  #tooltip .word {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 4px;
  }

  #tooltip .category {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    opacity: 0.7;
  }

  #tooltip .coords {
    font-size: 10px;
    color: #555;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Legend panel */
  #legend {
    position: absolute;
    bottom: 24px;
    left: 28px;
    pointer-events: auto;
    background: rgba(10, 10, 15, 0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 14px 18px;
    backdrop-filter: blur(12px);
    max-height: 320px;
    overflow-y: auto;
  }

  #legend h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.2s;
    font-size: 11px;
  }

  .legend-item:hover { opacity: 1; }
  .legend-item.dimmed { opacity: 0.2; }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    color: #bbb;
    text-transform: capitalize;
  }

  .legend-count {
    color: #555;
    margin-left: auto;
    font-size: 10px;
  }

  /* Controls hint */
  #controls-hint {
    position: absolute;
    bottom: 24px;
    right: 28px;
    font-size: 10px;
    color: #444;
    text-align: right;
    line-height: 1.8;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  /* Search */
  #search-container {
    position: absolute;
    top: 24px;
    right: 28px;
    pointer-events: auto;
  }

  #search {
    background: rgba(10, 10, 15, 0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 8px 14px;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    width: 200px;
    outline: none;
    backdrop-filter: blur(12px);
    transition: border-color 0.2s;
  }

  #search:focus {
    border-color: rgba(255,255,255,0.3);
  }

  #search::placeholder {
    color: #555;
  }

  /* Stats */
  #stats {
    position: absolute;
    top: 80px;
    right: 28px;
    font-size: 10px;
    color: #444;
    text-align: right;
    line-height: 1.8;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  /* Scrollbar */
  #legend::-webkit-scrollbar { width: 4px; }
  #legend::-webkit-scrollbar-track { background: transparent; }
  #legend::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  <div id="title-bar">
    <h1>Vector Space</h1>
    <div class="subtitle">738 words &middot; 18 clusters &middot; t-SNE 3D</div>
  </div>

  <div id="search-container">
    <input type="text" id="search" placeholder="Search words..." autocomplete="off" spellcheck="false">
  </div>

  <div id="stats"></div>

  <div id="legend"></div>

  <div id="controls-hint">
    drag to orbit<br>
    scroll to zoom<br>
    hover for details<br>
    click legend to filter
  </div>
</div>

<div id="tooltip">
  <div class="word"></div>
  <div class="category"></div>
  <div class="coords"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Orbit Controls (inline, minimal) ──
class OrbitControls {
  constructor(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.target = new THREE.Vector3();
    this.spherical = new THREE.Spherical();
    this.sphericalDelta = new THREE.Spherical();
    this.scale = 1;
    this.rotateSpeed = 0.8;
    this.zoomSpeed = 1.2;
    this.autoRotate = true;
    this.autoRotateSpeed = 0.3;
    this.enableDamping = true;
    this.dampingFactor = 0.08;

    this._isDragging = false;
    this._prevMouse = { x: 0, y: 0 };

    const offset = new THREE.Vector3();
    offset.copy(camera.position).sub(this.target);
    this.spherical.setFromVector3(offset);

    domElement.addEventListener('mousedown', e => {
      this._isDragging = true;
      this._prevMouse = { x: e.clientX, y: e.clientY };
      this.autoRotate = false;
    });
    domElement.addEventListener('mousemove', e => {
      if (!this._isDragging) return;
      const dx = e.clientX - this._prevMouse.x;
      const dy = e.clientY - this._prevMouse.y;
      this.sphericalDelta.theta -= dx * this.rotateSpeed * 0.01;
      this.sphericalDelta.phi -= dy * this.rotateSpeed * 0.01;
      this._prevMouse = { x: e.clientX, y: e.clientY };
    });
    domElement.addEventListener('mouseup', () => { this._isDragging = false; });
    domElement.addEventListener('mouseleave', () => { this._isDragging = false; });
    domElement.addEventListener('wheel', e => {
      e.preventDefault();
      this.scale *= e.deltaY > 0 ? 1.1 : 0.9;
      this.scale = Math.max(0.2, Math.min(5, this.scale));
    }, { passive: false });

    // Touch support
    let _touchStart = null;
    let _pinchDist = 0;
    domElement.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        this._isDragging = true;
        this._prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        this.autoRotate = false;
      } else if (e.touches.length === 2) {
        _pinchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    });
    domElement.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && this._isDragging) {
        const dx = e.touches[0].clientX - this._prevMouse.x;
        const dy = e.touches[0].clientY - this._prevMouse.y;
        this.sphericalDelta.theta -= dx * this.rotateSpeed * 0.01;
        this.sphericalDelta.phi -= dy * this.rotateSpeed * 0.01;
        this._prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        this.scale *= _pinchDist / dist;
        this.scale = Math.max(0.2, Math.min(5, this.scale));
        _pinchDist = dist;
      }
    }, { passive: false });
    domElement.addEventListener('touchend', () => { this._isDragging = false; });
  }

  update() {
    if (this.autoRotate) {
      this.sphericalDelta.theta -= this.autoRotateSpeed * 0.001;
    }
    this.spherical.theta += this.sphericalDelta.theta;
    this.spherical.phi += this.sphericalDelta.phi;
    this.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, this.spherical.phi));
    this.spherical.radius *= this.scale;
    this.spherical.radius = Math.max(20, Math.min(500, this.spherical.radius));
    this.scale = 1;

    const offset = new THREE.Vector3().setFromSpherical(this.spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);

    if (this.enableDamping) {
      this.sphericalDelta.theta *= (1 - this.dampingFactor);
      this.sphericalDelta.phi *= (1 - this.dampingFactor);
    } else {
      this.sphericalDelta.set(0, 0, 0);
    }
  }
}

// ── Main App ──
let scene, camera, renderer, controls;
let particles, particleData = [];
let labelSprites = [];
let raycaster, mouse;
let hoveredIndex = -1;
let activeCategories = new Set();
let searchTerm = '';
let embeddingData;

async function init() {
  // Load data
  const resp = await fetch('./data/embeddings_3d.json');
  embeddingData = await resp.json();

  activeCategories = new Set(embeddingData.categories);

  // Scene
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.004);

  // Camera
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(80, 60, 100);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Controls
  controls = new OrbitControls(camera, renderer.domElement);

  // Raycaster
  raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 1.2;
  mouse = new THREE.Vector2();

  // Create particles
  createParticles();
  createStarfield();
  createAxisLines();
  buildLegend();

  // Events
  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  document.getElementById('search').addEventListener('input', onSearch);

  animate();
}

function createParticles() {
  const words = embeddingData.words;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(words.length * 3);
  const colors = new Float32Array(words.length * 3);
  const sizes = new Float32Array(words.length);
  const alphas = new Float32Array(words.length);

  words.forEach((w, i) => {
    positions[i * 3] = w.x;
    positions[i * 3 + 1] = w.y;
    positions[i * 3 + 2] = w.z;

    const color = new THREE.Color(w.color);
    colors[i * 3] = color.r;
    colors[i * 3 + 1] = color.g;
    colors[i * 3 + 2] = color.b;

    sizes[i] = 1.8;
    alphas[i] = 0.9;

    particleData.push({
      word: w.word,
      category: w.category,
      color: w.color,
      position: new THREE.Vector3(w.x, w.y, w.z)
    });
  });

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

  // Custom shader for glow particles
  const material = new THREE.ShaderMaterial({
    uniforms: {
      uPixelRatio: { value: renderer.getPixelRatio() }
    },
    vertexShader: `
      attribute float size;
      attribute float alpha;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uPixelRatio;
      void main() {
        vColor = color;
        vAlpha = alpha;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * uPixelRatio * (120.0 / -mvPosition.z);
        gl_PointSize = max(gl_PointSize, 1.5);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        float glow = 1.0 - smoothstep(0.0, 0.5, dist);
        glow = pow(glow, 1.5);
        gl_FragColor = vec4(vColor, vAlpha * glow);
      }
    `,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // Create text labels for each word
  createLabels();
}

function createLabels() {
  // We use CSS2D-style labels via a canvas overlay approach
  // But for performance with 738 words, we'll selectively show labels
  // based on proximity to camera. Store label data for rendering.
}

function createStarfield() {
  const starsGeo = new THREE.BufferGeometry();
  const starCount = 3000;
  const positions = new Float32Array(starCount * 3);
  const starSizes = new Float32Array(starCount);

  for (let i = 0; i < starCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 600;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 600;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 600;
    starSizes[i] = Math.random() * 0.5 + 0.1;
  }

  starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const starMat = new THREE.PointsMaterial({
    color: 0x888888,
    size: 0.3,
    transparent: true,
    opacity: 0.4,
    sizeAttenuation: true
  });

  scene.add(new THREE.Points(starsGeo, starMat));
}

function createAxisLines() {
  const axisLen = 60;
  const axisMat = (color) => new THREE.LineBasicMaterial({
    color, transparent: true, opacity: 0.08
  });

  const makeAxis = (start, end, color) => {
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(...start),
      new THREE.Vector3(...end)
    ]);
    scene.add(new THREE.Line(geo, axisMat(color)));
  };

  makeAxis([-axisLen, 0, 0], [axisLen, 0, 0], 0xff4444);
  makeAxis([0, -axisLen, 0], [0, axisLen, 0], 0x44ff44);
  makeAxis([0, 0, -axisLen], [0, 0, axisLen], 0x4444ff);
}

function buildLegend() {
  const legend = document.getElementById('legend');
  const catCounts = {};
  embeddingData.words.forEach(w => {
    catCounts[w.category] = (catCounts[w.category] || 0) + 1;
  });

  legend.innerHTML = '<h3>Categories</h3>';

  embeddingData.categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.category = cat;

    const label = cat.replace(/_/g, ' ');
    item.innerHTML = `
      <div class="legend-dot" style="background:${embeddingData.color_map[cat]}"></div>
      <span class="legend-label">${label}</span>
      <span class="legend-count">${catCounts[cat] || 0}</span>
    `;

    item.addEventListener('click', () => toggleCategory(cat));
    legend.appendChild(item);
  });
}

function toggleCategory(cat) {
  if (activeCategories.has(cat)) {
    // If clicking the only active one, reactivate all
    if (activeCategories.size === 1) {
      activeCategories = new Set(embeddingData.categories);
    } else {
      activeCategories.delete(cat);
    }
  } else {
    activeCategories.add(cat);
  }
  updateVisibility();
}

function updateVisibility() {
  const alphas = particles.geometry.getAttribute('alpha');
  const sizes = particles.geometry.getAttribute('size');

  const allActive = activeCategories.size === embeddingData.categories.length;
  const searchActive = searchTerm.length > 0;

  particleData.forEach((pd, i) => {
    let visible = activeCategories.has(pd.category);
    if (searchActive) {
      visible = visible && pd.word.includes(searchTerm);
    }
    alphas.array[i] = visible ? 0.9 : 0.03;
    sizes.array[i] = visible ? 1.8 : 0.5;
  });

  alphas.needsUpdate = true;
  sizes.needsUpdate = true;

  // Update legend items
  document.querySelectorAll('.legend-item').forEach(item => {
    const cat = item.dataset.category;
    item.classList.toggle('dimmed', !activeCategories.has(cat));
  });
}

function onSearch(e) {
  searchTerm = e.target.value.toLowerCase().trim();
  updateVisibility();
}

function onMouseMove(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(particles);

  const tooltip = document.getElementById('tooltip');

  if (intersects.length > 0) {
    const idx = intersects[0].index;
    const pd = particleData[idx];

    if (activeCategories.has(pd.category)) {
      hoveredIndex = idx;
      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX + 16) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
      tooltip.querySelector('.word').textContent = pd.word;
      tooltip.querySelector('.word').style.color = pd.color;
      tooltip.querySelector('.category').textContent = pd.category.replace(/_/g, ' ');
      tooltip.querySelector('.coords').textContent =
        `x: ${pd.position.x.toFixed(1)}  y: ${pd.position.y.toFixed(1)}  z: ${pd.position.z.toFixed(1)}`;

      // Highlight hovered particle
      const sizes = particles.geometry.getAttribute('size');
      sizes.array[idx] = 4.0;
      sizes.needsUpdate = true;

      renderer.domElement.style.cursor = 'crosshair';
    } else {
      hideTooltip();
    }
  } else {
    hideTooltip();
  }
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
  if (hoveredIndex >= 0) {
    const sizes = particles.geometry.getAttribute('size');
    const isVisible = activeCategories.has(particleData[hoveredIndex].category);
    sizes.array[hoveredIndex] = isVisible ? 1.8 : 0.5;
    sizes.needsUpdate = true;
  }
  hoveredIndex = -1;
  renderer.domElement.style.cursor = 'default';
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── 2D Label Overlay ──
const labelCanvas = document.createElement('canvas');
const labelCtx = labelCanvas.getContext('2d');
labelCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:5;';
document.getElementById('hud').appendChild(labelCanvas);

function renderLabels() {
  labelCanvas.width = window.innerWidth * window.devicePixelRatio;
  labelCanvas.height = window.innerHeight * window.devicePixelRatio;
  labelCanvas.style.width = window.innerWidth + 'px';
  labelCanvas.style.height = window.innerHeight + 'px';
  labelCtx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const searchActive = searchTerm.length > 0;

  particleData.forEach((pd, i) => {
    if (!activeCategories.has(pd.category)) return;
    if (searchActive && !pd.word.includes(searchTerm)) return;

    // Project 3D to screen
    const v = pd.position.clone();
    v.project(camera);

    if (v.z > 1) return; // behind camera

    const x = (v.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-v.y * 0.5 + 0.5) * window.innerHeight;

    // Distance-based visibility: only show labels for nearby words
    const dist = camera.position.distanceTo(pd.position);
    const maxDist = controls.spherical.radius * 0.8;

    let alpha = 0;
    if (i === hoveredIndex) {
      alpha = 1.0;
    } else if (searchActive && pd.word.includes(searchTerm)) {
      alpha = 0.9;
    } else if (dist < maxDist * 0.3) {
      alpha = 0.85;
    } else if (dist < maxDist * 0.5) {
      alpha = 0.5;
    } else if (dist < maxDist * 0.75) {
      alpha = 0.2;
    } else {
      return;
    }

    const fontSize = i === hoveredIndex ? 14 : (searchActive ? 12 : Math.max(9, 13 - dist * 0.05));
    labelCtx.font = `${Math.round(fontSize)}px 'JetBrains Mono', monospace`;
    labelCtx.fillStyle = pd.color;
    labelCtx.globalAlpha = alpha;
    labelCtx.fillText(pd.word, x + 6, y + 3);
  });

  labelCtx.globalAlpha = 1;
}

// ── Animation Loop ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  renderLabels();
}

init();
</script>
</body>
</html>
